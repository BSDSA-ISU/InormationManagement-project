<style>
    .athlete-list {
        list-style: none;
        padding: 0;
    }

    .athlete-item {
        display: flex;
        justify-content: space-between;
        align-items: center;
        background: rgba(255, 255, 255, 0.03);
        margin-bottom: 10px;
        padding: 12px 18px;
        border-radius: 10px;
        border: 1px solid var(--border);
        transition: transform 0.2s ease, background 0.2s ease;
    }

    .athlete-item:hover {
        background: rgba(255, 255, 255, 0.06);
        transform: translateX(5px);
        border-color: var(--accent);
    }

    .athlete-link {
        text-decoration: none;
        color: var(--text);
        font-weight: 600;
        font-size: 1.1rem;
        flex-grow: 1;
    }

    .small-delete-btn {
        background: rgba(239, 68, 68, 0.1);
        color: #ef4444;
        border: 1px solid rgba(239, 68, 68, 0.3);
        padding: 6px 12px;
        border-radius: 6px;
        cursor: pointer;
        font-size: 0.85rem;
        font-weight: bold;
        transition: all 0.2s;
    }

    .small-delete-btn:hover {
        background: #ef4444;
        color: white;
        border-color: #ef4444;
        box-shadow: 0 0 10px rgba(239, 68, 68, 0.4);
    }
</style>

<ul class="athlete-list">
    {% for a in athletes %}
        <li class="athlete-item">
            <a href="/athlete/{{ a[0] }}" class="athlete-link">
                👤 {{ a[1] }}
            </a>
            <form action="/delete/{{ a[0] }}" method="POST" style="display:inline;">
                <button type="submit" class="small-delete-btn" onclick="return confirm('Are you sure you want to delete {{ a[1] }}? This cannot be undone.')">
                    🗑 Delete
                </button>
            </form>
        </li>
    {% endfor %}
</ul>
