<!DOCTYPE html>
<html>
<head>
    <title>Edit Nutrition Entry</title>
    <link rel="stylesheet" href="/static/style.css">
</head>

<body>

    <header class="navbar">
        <div class="nav-container">
            <div class="logo">
                <img src="/static/logo.png" style="border-radius: 50%;">
                <span>Edit Nutrition</span>
            </div>

            <nav>
                    <a href="/edit/nutrition/{{ log[1] }}">Back</a>
                </div>
            </nav>
        </div>
    </header>

    <main class="container">

    <h2>✏️ Edit Nutrition Entry</h2>

    <section class="card">

        <form method="POST">

            <div class="input-group">
                <label>Meal type</label>
                <select name="meal_type">
                    <option>Breakfast</option>
                    <option>Lunch</option>
                    <option>Dinner</option>
                    <option>Snack</option>
                </select>
            </div>

            <div class="input-group">
                <label>calories (Kcal): </label>
                <input type="number" name="calories" value="{{ log[3] }}">
            </div>

            <div class="input-group">
                <label>Protein (grams):</label>
                <input type="number" name="protein" value="{{ log[4] }}">
            </div>

            <div class="input-group">
                <label>carbs (grams):</label>
                <input type="number" name="carbs" value="{{ log[5] }}">
            </div>

            <div class="input-group">
                <label>fats (grams):</label>
                <input type="number" name="fats" value="{{ log[6] }}">
            </div>

            <div class="input-group">
                <label>Log Date:</label>
                <input type="date" name="log_date" value="{{ log[7] }}">
            </div>

            <button class="project-btn">💾 Save Changes</button>

        </form>
    </section>


</main>


</body>
</html>
