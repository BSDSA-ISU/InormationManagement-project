<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Nutrition Entry</title>
    <link rel="icon" type="image/png" href="/static/logo.png">
    <link rel="stylesheet" href="/static/style.css">
    <style>
        .input-group {
            margin-bottom: 20px;
        }
        .input-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.9rem;
            color: var(--muted);
        }
        /* Grid for the 3 main macros */
        .macro-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
        }
    </style>
</head>

<body>

    {% include '/partials/navbar.html' %}

            <nav>
                <a href="/edit/nutrition/{{ log[1] }}" class="basicbutton">← Back</a>
            </nav>
        </div>
    </header>

    <main class="container" style="max-width: 600px;">

        <h2 style="margin-bottom: 20px; color: var(--accent);">✏️ Edit Nutrition Entry</h2>

        <section class="card instruction-box">

            <form method="POST" class="form">

                <div class="input-group">
                    <label>Meal Type</label>
                    <select name="meal_type" required>
                        <option {% if log[2] == 'Breakfast' %}selected{% endif %}>Breakfast</option>
                        <option {% if log[2] == 'Lunch' %}selected{% endif %}>Lunch</option>
                        <option {% if log[2] == 'Dinner' %}selected{% endif %}>Dinner</option>
                        <option {% if log[2] == 'Snack' %}selected{% endif %}>Snack</option>
                    </select>
                </div>

                <div class="input-group">
                    <label>Total Calories (kcal)</label>
                    <input type="number" name="calories" value="{{ log[3] }}" required>
                </div>

                <hr style="margin: 20px 0; border-color: var(--border); opacity: 0.3;">

                <div class="macro-grid">
                    <div class="input-group">
                        <label>Protein (g)</label>
                        <input type="number" name="protein" value="{{ log[4] }}" required>
                    </div>

                    <div class="input-group">
                        <label>Carbs (g)</label>
                        <input type="number" name="carbs" value="{{ log[5] }}" required>
                    </div>

                    <div class="input-group">
                        <label>Fats (g)</label>
                        <input type="number" name="fats" value="{{ log[6] }}" required>
                    </div>
                </div>

                <div class="input-group">
                    <label>Log Date</label>
                    <input type="date" name="log_date" value="{{ log[7] }}" required>
                </div>

                <button type="submit" class="project-btn" style="width: 100%; justify-content: center;">
                    💾 Save Changes
                </button>

            </form>
        </section>

    </main>

</body>
</html>
