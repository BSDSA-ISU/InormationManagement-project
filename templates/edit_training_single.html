<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Training Entry</title>
    <link rel="icon" type="image/png" href="/static/logo.png">
    <link rel="stylesheet" href="/static/style.css">
</head>

<body>
    <header class="navbar">
        <div class="nav-container">
            <div class="logo">
                <img src="/static/logo.png" style="border-radius: 50%;">
                <span>Training Editor</span>
            </div>
            <nav>
                <a href="/edit/training/{{ log[1] }}" class="basicbutton">← Back</a>
            </nav>
        </div>
    </header>

    <main class="container" style="max-width: 600px;">
        <h2 style="margin-bottom: 20px; color: var(--accent);">✏️ Edit Training Session</h2>

        <section class="card instruction-box">
            <form method="POST" class="form">
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                    <div class="input-group">
                        <label style="display:block; margin-bottom:8px; color:var(--muted); font-size:0.9rem;">Session Type</label>
                        <input name="session_type" value="{{ log[2] }}" required>
                    </div>        
                
                    <div class="input-group">
                        <label style="display:block; margin-bottom:8px; color:var(--muted); font-size:0.9rem;">Duration (Min)</label>
                        <input type="number" name="duration_minutes" value="{{ log[3] }}" required>
                    </div>
                </div>

                <div class="input-group">
                    <label style="display:block; margin-bottom:8px; color:var(--muted); font-size:0.9rem;">Intensity Level</label>
                    <select name="intensity">
                        <option {% if log[4]|lower == 'low' %}selected{% endif %}>low</option>
                        <option {% if log[4]|lower == 'medium' %}selected{% endif %}>medium</option>
                        <option {% if log[4]|lower == 'high' %}selected{% endif %}>high</option>
                    </select>
                </div>
            
                <div class="input-group">
                    <label style="display:block; margin-bottom:8px; color:var(--muted); font-size:0.9rem;">Calories Burned (kcal)</label>
                    <input type="number" name="calories_burned" value="{{ log[5] }}">
                </div>
            
                <div class="input-group" style="margin-bottom: 25px;">
                    <label style="display:block; margin-bottom:8px; color:var(--muted); font-size:0.9rem;">Session Date</label>
                    <input type="date" name="session_date" value="{{ log[6] }}" required>
                </div>
            
                <button type="submit" class="project-btn" style="width:100%; justify-content:center;">💾 Save Session</button>
            </form>
        </section>
    </main>
</body>
</html>
