<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="/static/logo.png">

    <title>Athlete List - Dashboard</title>

    <link rel="stylesheet" href="/static/style.css">
    <meta name="google" content="notranslate">
</head>
<body>
    {% include '/partials/navbar.html' %}
            <nav>
                <a href="/" class="basicbutton">Home</a>
            </nav>
        </div>
    </header>

    <main class="container" style="max-width: 800px;">
        <section class="card">
            <!-- Search Form Area -->
            <form method="GET" action="/athletes" class="form" style="margin-bottom: 30px;">
                <h2 style="color: var(--accent); margin-bottom: 15px;">Search Athletes</h2>
                <div style="display: flex; gap: 10px;">
                    <input 
                        type="text" 
                        name="search" 
                        placeholder="Search by name..." 
                        value="{{ search }}"
                        style="flex: 1; margin-bottom: 0;"
                    >
                    <button type="submit" style="width: auto; padding: 0 25px;">Search</button>
                </div>
            </form>

            <hr style="margin: 20px 0; opacity: 0.3;">

            <!-- Athlete List Area -->
            <ul class="athlete-list" style="padding: 0;">
                {% for a in athletes %}
                    <li style="display: flex; justify-content: space-between; align-items: center; padding: 15px; border-bottom: 1px solid var(--border); transition: 0.2s; border-radius: 8px;">
                        
                        <a href="/athlete/{{ a[0] }}" style="font-weight: 600; text-decoration: none; font-size: 1.1rem; color: var(--text);">
                            {{ a[1] }}
                        </a>

                        <form action="/delete/{{ a[0] }}" method="POST" style="margin: 0;">
                            <button type="submit" class="small-delete-btn" 
                                    style="padding: 6px 12px; font-size: 0.8rem; background: rgba(239, 68, 68, 0.1);" 
                                    onclick="return confirm('Delete {{ a[1] }}? This cannot be undone.')">
                                🗑 Delete
                            </button>
                        </form>
                    </li>
                {% else %}
                    <li style="text-align: center; color: var(--muted); padding: 40px;">
                        No athletes found matching your search.
                    </li>
                {% endfor %}
            </ul>
        </section>
    </main>

</body>
</html>
