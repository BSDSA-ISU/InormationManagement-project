<!DOCTYPE html>
<html>
<head>
    <title>Add Athlete</title>
    <link rel="stylesheet" href="/static/style.css">
    
    <link rel="icon" type="image/png" href="/static/logo.png">
</head>
<body>

    <header class="navbar">
        <div class="nav-container">
            <div class="logo">
                <img src="/static/logo.png" style="border-radius: 50%;">
                <span>Add Athlete</span>
            </div>

            <nav>
                    <a href="/">Home</a>
                </div>
            </nav>
        </div>
    </header>

    <main class="container">

        <section class="card">
            <h2>➕ Add New Athlete</h2>
        
            <form method="POST" class="form">
                <input name="name" placeholder="Name" required>
                <input name="age" type="number" placeholder="Age">
            
                <select name="sex">
                    <option disabled selected>Sex</option>
                    <option>Male</option>
                    <option>Female</option>
                    <option>Other</option>
                </select>
            
                <input name="weight" type="number" step="0.1" placeholder="Weight (kg)">
                <input name="height" type="number" step="0.1" placeholder="Height (cm)">
            
                <button type="submit">Add Athlete</button>
            </form>
        
        </section>

    </main>

</body>

<script>
const urlParams = new URLSearchParams(window.location.search);
if (urlParams.get('error') === 'admins_only') {
    alert("🚫 Admins only!");
}
</script>

</html>
