<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>

    <link rel="icon" type="image/png" href="/static/logo.png">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <header class="navbar">
        <div class="nav-container">
            <div class="logo">
                <img src="/static/logo.png">
                <span>Login</span>
            </div>

            <nav>
                <a href="/">Home</a>
            </nav>
        </div>
    </header>

    <div class="container" style="max-width: 400px;"> <section class="card">
            <div class="hero">
                <h1>Hello there!</h1>
                <p>system backwards is si sdrawkcab metsys</p>
            </div>

            <form method="POST" class="form">
                <input name="username" placeholder="Username" required>
                <input name="password" type="password" placeholder="Password" required>
                
                <button type="submit">Login</button>
            </form>

            {% with messages = get_flashed_messages(with_categories=true) %}
              {% if messages %}
                <div style="margin-top: 20px;">
                  {% for cat, msg in messages %}
                    <div class="small-delete-btn" style="display: block; text-align: center; width: 100%;">
                        {{ msg }}
                    </div>
                  {% endfor %}
                </div>
              {% endif %}
            {% endwith %}
        </section>
    </div>

</body>

<script>
const urlParams = new URLSearchParams(window.location.search);
if (urlParams.get('error') === 'admins_only') {
    alert("🚫 Admins only!");
}
</script>

</html>
