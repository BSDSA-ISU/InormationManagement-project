<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Training Logs</title>
    <link rel="icon" type="image/png" href="/static/logo.png">
    <link rel="stylesheet" href="/static/style.css">
    <style>
        .multi-box {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255, 255, 255, 0.03);
            border-left: 4px solid #f59e0b; /* Orange for training */
            padding: 15px;
            margin-bottom: 12px;
            border-radius: 12px;
        }
    </style>
</head>

<body>
    <header class="navbar">
        <div class="nav-container">
            <div class="logo">
                <img src="/static/logo.png" style="border-radius: 50%;">
                <span>Training History</span>
            </div>
            <nav><a href="/athlete/{{ athlete_id }}" class="basicbutton">← Back</a></nav>
        </div>
    </header>

    <main class="container" style="max-width: 850px;">
        <section class="card">
            <h2 style="margin-bottom: 20px;">💪 All Training Entries</h2>
            {% for n in logs %}
            <div class="multi-box">
                <div>
                    <div style="font-weight: bold; font-size: 1.1rem;">
                        {{ n[1] }} <span style="font-weight: normal; color: var(--muted); font-size: 0.85rem; margin-left: 8px;">📅 {{ n[5] }}</span>
                    </div>
                    <div style="font-size: 0.9rem; color: var(--muted); margin-top: 5px;">
                        Time: <b style="color:var(--text);">{{ n[2] }}m</b> | 
                        Intensity: <b style="color:var(--text);">{{ n[3] }}</b> | 
                        Burned: <b style="color:var(--accent);">{{ n[4] }} kcal</b>
                    </div>
                </div>
                <a href="/edit/training/single/{{ n[0] }}" class="explore-btn" style="font-size: 0.8rem; padding: 6px 12px;">✏️ Edit</a>
            </div>
            {% endfor %}
        </section>
    </main>
</body>
</html>
