<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Nutrition Logs - Athlete System</title>
    <link rel="icon" type="image/png" href="/static/logo.png">
    <link rel="stylesheet" href="/static/style.css">
    <style>
        .multi-box {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255, 255, 255, 0.03);
            border-left: 4px solid var(--accent);
            padding: 15px;
            margin-bottom: 12px;
            border-radius: 12px;
            transition: 0.2s ease;
        }
        .multi-box:hover {
            background: rgba(255, 255, 255, 0.06);
            transform: translateX(4px);
        }
        .meal-info b {
            color: var(--accent);
            font-size: 1.1rem;
        }
        .meal-date {
            font-size: 0.85rem;
            color: var(--muted);
            margin-left: 8px;
        }
        .macro-badge-row {
            margin-top: 5px;
            display: flex;
            gap: 12px;
            font-size: 0.9rem;
            color: var(--text);
        }
        .macro-badge-row span b {
            color: var(--accent);
        }
        .edit-action-link {
            text-decoration: none;
            color: var(--accent);
            font-weight: bold;
            font-size: 0.9rem;
            padding: 8px 16px;
            border-radius: 8px;
            background: rgba(56, 189, 248, 0.1);
            transition: 0.2s;
        }
        .edit-action-link:hover {
            background: var(--accent);
            color: var(--bg);
        }
    </style>
</head>

<body>

    <header class="navbar">
        <div class="nav-container">
            <div class="logo">
                <img src="/static/logo.png" style="border-radius: 50%;">
                <span>Nutrition History</span>
            </div>

            <nav>
                <a href="/athlete/{{ athlete_id }}" class="basicbutton">← Back</a>
            </nav>
        </div>
    </header>

    <main class="container" style="max-width: 850px;">
    
        <section class="card">
        
            <h2 style="margin-bottom: 25px;">📋 All Nutrition Entries</h2>
        
            {% for n in logs %}
            <div class="multi-box">
                <div class="meal-content">
                    <div class="meal-header">
                        <b>{{ n[1] }}</b> 
                        <span class="meal-date">📅 {{ n[6] }}</span>
                    </div>
                    
                    <div class="macro-badge-row">
                        <span>🔥 <b>{{ n[2] }}</b> kcal</span>
                        <span style="opacity: 0.3;">|</span>
                        <span>P: <b>{{ n[3] }}g</b></span>
                        <span>C: <b>{{ n[4] }}g</b></span>
                        <span>F: <b>{{ n[5] }}g</b></span>
                    </div>
                </div>
            
                <a href="/edit/nutrition/single/{{ n[0] }}" class="edit-action-link">
                    ✏️ Edit
                </a>
            </div>
            {% else %}
                <div style="text-align: center; padding: 40px; color: var(--muted);">
                    No nutrition logs found for this athlete.
                </div>
            {% endfor %}
        
        </section>
    
    </main>

</body>
</html>
