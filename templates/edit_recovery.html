<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recovery History</title>
    <link rel="icon" type="image/png" href="/static/logo.png">
    <link rel="stylesheet" href="/static/style.css">
    <style>
        .multi-box {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255, 255, 255, 0.03);
            border-left: 4px solid #a855f7; /* Purple accent for recovery */
            padding: 15px;
            margin-bottom: 12px;
            border-radius: 12px;
        }
        .recovery-stats {
            display: flex;
            gap: 15px;
            font-size: 0.9rem;
            color: var(--muted);
            margin-top: 5px;
        }
        .recovery-stats b { color: var(--text); }
        .edit-pill {
            text-decoration: none;
            background: rgba(168, 85, 247, 0.1);
            color: #a855f7;
            padding: 6px 14px;
            border-radius: 8px;
            font-weight: bold;
            font-size: 0.85rem;
            transition: 0.2s;
        }
        .edit-pill:hover { background: #a855f7; color: #fff; }
    </style>
</head>

<body>
    {% include '/partials/navbar.html' %}
            <nav>
                <a href="/athlete/{{ athlete_id }}" class="basicbutton">← Back</a>
            </nav>
        </div>
    </header>

    <main class="container" style="max-width: 850px;">
        <section class="card">
            <h2 style="margin-bottom: 20px;">🛌 All Recovery Entries</h2>

            {% for n in logs %}
            <div class="multi-box">
                <div>
                    <div style="font-size: 1.1rem; font-weight: bold;">
                        🌙 {{ n[1] }} Hours Sleep 
                        <span style="font-weight: normal; color: var(--muted); font-size: 0.85rem; margin-left: 10px;">
                            📅 {{ n[5] }}
                        </span>
                    </div>
                    <div class="recovery-stats">
                        <span>Soreness: <b>{{ n[2] }}</b></span>
                        <span>Stress: <b>{{ n[3] }}</b></span>
                        <span>Score: <b style="color: var(--accent);">{{ n[4] }}</b></span>
                    </div>
                </div>

                <a href="/edit/recovery/single/{{ n[0] }}" class="edit-pill">
                    ✏️ Edit
                </a>
            </div>
            {% else %}
                <p style="text-align: center; color: var(--muted); padding: 30px;">No recovery logs found.</p>
            {% endfor %}
        </section>
    </main>
</body>
</html>
