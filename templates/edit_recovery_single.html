<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Recovery Entry</title>
    <link rel="icon" type="image/png" href="/static/logo.png">
    <link rel="stylesheet" href="/static/style.css">
    <style>
        .input-group { margin-bottom: 20px; }
        .input-group label { display: block; margin-bottom: 8px; color: var(--muted); font-size: 0.9rem; }
        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }
    </style>
</head>

<body>
    {% include '/partials/navbar.html' %}
            <nav>
                <a href="/edit/recovery/{{ log[1] }}" class="basicbutton">← Back</a>
            </nav>
        </div>
    </header>

    <main class="container" style="max-width: 650px;">
        <section class="card instruction-box">
            <h2 style="margin-bottom: 20px; color: var(--accent);">✏️ Edit Recovery Entry</h2>

            <form method="POST" class="form">
                <div class="input-group">
                    <label>Sleep Duration (Hours)</label>
                    <input type="number" step="any" name="sleep_hours" value="{{ log[2] }}" required>
                </div>

                <div class="metrics-grid">
                    <div class="input-group">
                        <label>Soreness (1-10)</label>
                        <select name="soreness_level" required>
                            <option value="">Select Level</option>
                            {% for i in range(1, 11) %}
                            <option value="{{ i }}" {% if log[3]|int == i %}selected{% endif %}>{{ i }}</option>
                            {% endfor %}
                        </select>
                    </div>

                    <div class="input-group">
                        <label>Stress (1-10)</label>
                        <select name="stress_level" required>
                            <option value="">Select Level</option>
                            {% for i in range(1, 11) %}
                            <option value="{{ i }}" {% if log[4]|int == i %}selected{% endif %}>{{ i }}</option>
                            {% endfor %}
                        </select>
                    </div>

                    <div class="input-group">
                        <label>Recovery Score (1-10)</label>
                        <select name="recovery_score" required>
                            <option value="">Select Score</option>
                            {% for i in range(1, 11) %}
                            <option value="{{ i }}" {% if log[5]|int == i %}selected{% endif %}>{{ i }}</option>
                            {% endfor %}
                        </select>
                    </div>
                </div>

                <div class="input-group">
                    <label>Log Date</label>
                    <input type="date" name="log_date" value="{{ log[6] }}" required>
                </div>

                <button type="submit" class="project-btn" style="width: 100%; justify-content: center;">
                    💾 Save Changes
                </button>
            </form>
        </section>
    </main>
</body>
</html>
