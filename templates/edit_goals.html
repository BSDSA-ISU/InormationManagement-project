<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Goals - Athlete System</title>
    <link rel="icon" type="image/png" href="/static/logo.png">
    <link rel="stylesheet" href="/static/style.css">
    <style>
        .multi-box {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255, 255, 255, 0.03);
            border-left: 4px solid var(--accent);
            padding: 15px;
            margin-bottom: 12px;
            border-radius: 8px;
            transition: 0.2s;
        }
        .multi-box:hover {
            background: rgba(255, 255, 255, 0.07);
        }
        .goal-info b {
            color: var(--accent);
            font-size: 1.1rem;
            display: block;
            margin-bottom: 4px;
        }
        .goal-meta {
            font-size: 0.85rem;
            color: var(--muted);
        }
        .edit-link {
            text-decoration: none;
            font-weight: bold;
            color: var(--accent);
            padding: 8px 12px;
            border-radius: 6px;
            border: 1px solid transparent;
            transition: 0.2s;
        }
        .edit-link:hover {
            border-color: var(--accent);
            background: rgba(56, 189, 248, 0.1);
        }
    </style>
</head>

<body>

    <header class="navbar">
        <div class="nav-container">
            <div class="logo">
                <img src="/static/logo.png" style="border-radius: 50%;">
                <span>Goal History</span>
            </div>

            <nav>
                <a href="/athlete/{{ athlete_id }}" class="basicbutton">
                    <span>←</span> Back to Dashboard
                </a>
            </nav>
        </div>
    </header>

    <main class="container" style="max-width: 800px;">

        <section class="card">
        
            <h2 style="margin-bottom: 20px; color: var(--text);">📋 All Goal Entries</h2>
            
            {% for n in logs %}
                <div class="multi-box">
                    <div class="goal-info">
                        <b>{{ n[1] }}</b>
                        <p style="margin-bottom: 5px;">Progression: <span style="color: var(--text);">{{ n[3] }} / {{ n[2] }}</span></p>
                        <p class="goal-meta">
                            📅 {{ n[4] }} <span style="margin: 0 8px; opacity: 0.5;">→</span> {{ n[5] }}
                        </p>
                    </div>
                
                    <a href="/edit/goals/single/{{ n[0] }}" class="edit-link">
                        ✏️ Edit
                    </a>
                </div>
            {% else %}
                <div style="text-align: center; padding: 40px; color: var(--muted);">
                    <p>No goal entries found for this athlete.</p>
                </div>
            {% endfor %}

        </section>

    </main>

</body>
</html>
