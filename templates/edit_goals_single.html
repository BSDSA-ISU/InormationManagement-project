<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Goal Entry</title>
    <link rel="icon" type="image/png" href="/static/logo.png">
    <link rel="stylesheet" href="/static/style.css">
    <style>
        .input-group {
            margin-bottom: 20px;
        }
        .input-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.9rem;
            color: var(--muted);
            font-weight: 500;
        }
        .grid-inputs {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
    </style>
</head>

<body>
    {% include '/partials/navbar.html' %}

            <nav>
                <a href="/edit/goals/{{ log[1] }}" class="basicbutton">
                    <span>←</span> Back
                </a>
            </nav>
        </div>
    </header>

    <main class="container" style="max-width: 600px;">

        <div class="hero" style="text-align: left; padding-bottom: 10px;">
            <h2 style="color: var(--accent);">✏️ Edit Goal Entry</h2>
            <p style="font-size: 0.9rem;">Update the targets and timeline for this athlete.</p>
        </div>

        <section class="card instruction-box">
            <form method="POST" class="form">

                <div class="input-group">
                    <label>Goal Type / Description</label>
                    <input name="goal_type" value="{{ log[2] }}" placeholder="e.g., Weight Loss, Daily Steps" required>
                </div>

                <div class="grid-inputs">
                    <div class="input-group">
                        <label>Target Value</label>
                        <input type="number" name="target_value" value="{{ log[3] }}" required>
                    </div>

                    <div class="input-group">
                        <label>Current Value</label>
                        <input type="number" name="current_value" value="{{ log[4] }}" required>
                    </div>
                </div>

                <div class="grid-inputs">
                    <div class="input-group">
                        <label>Start Date</label>
                        <input type="date" name="start_date" value="{{ log[5] }}" required>
                    </div>

                    <div class="input-group">
                        <label>Target End Date</label>
                        <input type="date" name="end_date" value="{{ log[6] }}" required>
                    </div>
                </div>

                <div style="margin-top: 10px;">
                    <button type="submit" class="project-btn" style="width: 100%; justify-content: center;">
                        💾 Save Changes
                    </button>
                </div>

            </form>
        </section>
    </main>
</body>
</html>
