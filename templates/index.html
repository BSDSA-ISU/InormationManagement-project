<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Athlete Dashboard</title>

    <link rel="icon" type="image/png" href="/static/logo.png">
    <link rel="stylesheet" href="/static/style.css">
</head>

<body>

<header class="navbar">
    <div class="nav-container">
        <div class="logo">
            <img src="/static/logo.png">
            <span>Dashboard</span>
        </div>

        <nav>
            <a target="_blank" href="https://github.com/BSDSA-ISU/InormationManagement-project">GitHub</a>
            <a href="/">Home</a>
        </nav>
    </div>
</header>

<main class="container">

    <section class="hero">
        <h1>Welcome to the Athlete System</h1>
        <p>Track. Improve. Dominate.</p>

        <img class="mascot" src="https://media1.tenor.com/m/rk01T4ZkU9UAAAAC/kaguya-kaguya-houraisan.gif">
    </section>

    <section class="card">
        <h2>👥 Select an Athletes</h2>

        <ul class="athlete-list">
            {% for a in athletes %}
                <li>
                    <a href="/athlete/{{ a[0] }}">{{ a[1] }}</a>
                </li>
            {% endfor %}
        </ul>
    </section>

    <section class="card">
        <h2>➕ Add New Athlete</h2>

        <form method="POST" class="form">
            <input name="name" placeholder="Name" required>

            <input name="age" type="number" placeholder="Age">

            <select name="sex">
                <option disabled selected>Sex</option>
                <option>Male</option>
                <option>Female</option>
                <option>Other</option>
            </select>

            <input name="weight" type="number" step="0.1" placeholder="Weight (kg)">
            <input name="height" type="number" step="0.1" placeholder="Height (cm)">

            <button type="submit">Add Athlete</button>
        </form>
    </section>

</main>

<footer>
    <small>
        Touhou Project © Team Shanghai Alice (ZUN). Fan content used for educational purposes only.
    </small>
</footer>

</body>
</html>
